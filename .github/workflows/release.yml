name: Release

on:
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.21", "1.22", "1.23"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Run tests
        run: go test -v -count=1 -race ./...

  # Go modules are released by tagging the repository.
  # Once the tag is pushed and tests pass, the module is available
  # via the Go module proxy (proxy.golang.org) automatically.
  verify:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Verify module
        run: |
          go build ./...
          go vet ./...

      - name: Request module proxy cache
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "Requesting proxy cache for $VERSION"
          curl -s "https://proxy.golang.org/github.com/!mina!protocol/mina-sdk-go/@v/${VERSION}.info" || true
